name: basic-dev
description: Minimal Agent-native development workflow
global_context: |
  # 项目全局约束（示例）
  - 所有接口变更必须保持向后兼容
  - 使用 TypeScript 5.x 严格模式
  - 测试覆盖率要求 > 80%
routing:
  keywords: ["开发", "实现", "需求", "编程", "coding", "develop", "分析", "设计", "验证"]
  description_short: "基础开发流程（分析→设计→验证）"
  triggers:
    - "开发.*(功能|需求|代码)"
    - "(实现|编写).*(功能|代码)"
  priority: 5
params:
  change_name:
    type: string
    required: true
    description: Change name or workflow subject
token_budget:
  total: 50000
  per_step: 8000
steps:
  - id: analyze
    name: Analyze
    execution: delegate
    tools:
      - search
      - gitnexus-exploring
    agent:
      model: gpt-4o
      temperature: 0.7
    checkpoint:
      required_outputs:
        analysis_summary:
          type: string
          min_length: 20
          help: Provide a concise analysis summary.
      conditions:
        - natural: analysis_summary has been produced
          check: outputs.analysis_summary != null AND len(outputs.analysis_summary) > 20
          help: Confirm the analysis summary is complete enough to guide design.
    next: design
  - id: design
    name: Design
    execution: delegate
    tools:
      - general_purpose_task
    checkpoint:
      required_outputs:
        design_summary:
          type: string
          min_length: 20
          help: Provide a concrete design summary.
      conditions:
        - natural: design_summary has been produced
          check: outputs.design_summary != null AND len(outputs.design_summary) > 20
          help: Confirm the design summary covers the implementation approach.
    next: verify
  - id: verify
    name: Verify
    execution: delegate
    tools:
      - search
    checkpoint:
      required_outputs:
        verification_result:
          type: string
          min_length: 5
          help: Provide the verification result.
      conditions:
        - natural: verification_result has been produced
          check: outputs.verification_result != null
          help: Confirm verification has been completed.
    next: null
